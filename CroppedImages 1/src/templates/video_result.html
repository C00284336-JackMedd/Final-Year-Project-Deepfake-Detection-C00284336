<!DOCTYPE html>
<html>
<head>
    <title>Extraction Complete</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            margin: 0;
            padding: 0;
        }

        .navbar {
            width: 100%;
            background: #1a1a1a;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            gap: 40px;
            box-shadow: 0 0 10px rgba(0,0,0,0.6);
            position: fixed;
            top: 0;
            left: 0;
        }

        .nav-item {
            color: #4CAF50;
            text-decoration: none;
            font-size: 18px;
            padding: 8px 14px;
            border-radius: 6px;
            transition: 0.2s;
        }

        .nav-item:hover {
            background: #333;
        }

        .container {
            margin: 120px auto;
            width: 90%;
            max-width: 1000px;
            text-align: center;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            margin-top: 30px;
        }

        .gallery img {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #333;
            transition: 0.2s;
            cursor: pointer;
        }

        .gallery img:hover {
            transform: scale(1.05);
            border-color: #4CAF50;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="/" class="nav-item">Image Detector</a>
        <a href="/video" class="nav-item">Video Frame Extractor</a>
    </div>

    <div class="container">
        <h1>Extraction Complete</h1>
        <p>{{ count }} face frames were extracted.</p>

        <div class="gallery">
            {% for frame in frames %}
                <a href="{{ frame }}" target="_blank">
                    <img src="{{ frame }}">
                </a>
            {% endfor %}
        </div>
    </div>

</body>
</html>
